<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stars Casino | Ігри на Telegram Stars</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #17212b;
            --card-bg: #202b36;
            --accent-color: #24b155;
            --text-main: #ffffff;
            --text-muted: #7f91a4;
            --gold: #f4b400;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding-bottom: 80px;
            overflow-x: hidden;
        }

        .header {
            background-color: var(--card-bg);
            padding: 16px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            margin-bottom: 15px;
        }

        .user-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            background: #2b394a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 16px;
        }

        .username {
            font-size: 15px;
            font-weight: 600;
        }

        .user-id {
            font-size: 12px;
            color: var(--text-muted);
        }

        .balance-badge {
            background: rgba(244, 180, 0, 0.1);
            border: 1px solid rgba(244, 180, 0, 0.2);
            padding: 6px 12px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: bold;
            color: var(--gold);
            font-size: 14px;
        }

        .container {
            padding: 0 14px;
        }

        .section-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .game-card {
            background-color: var(--card-bg);
            border-radius: 14px;
            padding: 14px;
            text-align: center;
            transition: transform 0.1s;
            border: 1px solid rgba(255,255,255,0.02);
        }

        .game-card:active {
            transform: scale(0.97);
        }

        .game-icon {
            font-size: 42px;
            margin-bottom: 8px;
            display: inline-block;
        }

        .game-name {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 2px;
        }

        /* Фіксоване меню знизу */
        .nav-bar {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 60px;
            background-color: var(--card-bg);
            border-top: 1px solid rgba(255,255,255,0.05);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-muted);
            font-size: 11px;
            text-decoration: none;
            gap: 2px;
        }

        .nav-item.active {
            color: #3498db;
        }

        .nav-item span {
            font-size: 20px;
        }

        /* МОДАЛКА СТАВКИ */
        .modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }

        .modal.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            width: 100%;
            max-width: 320px;
            text-align: center;
        }

        .modal-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 12px;
        }

        .bet-input-box {
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
            padding: 8px;
            margin-bottom: 15px;
        }

        .bet-input-box input {
            background: transparent;
            border: none;
            color: white;
            font-size: 22px;
            font-weight: bold;
            text-align: center;
            width: 100px;
            outline: none;
        }

        .bet-btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
        }

        .close-btn {
            margin-top: 10px;
            color: var(--text-muted);
            font-size: 12px;
            cursor: pointer;
            display: inline-block;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="user-box">
            <div class="user-info">
                <div class="avatar" id="user-avatar">👤</div>
                <div>
                    <div class="username" id="user-name">Гість</div>
                    <div class="user-id" id="user-id">ID: 00000000</div>
                </div>
            </div>
            <div class="balance-badge">
                <span>⭐</span> <span id="user-balance">0</span>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="section-title">🎰 Усі ігри</div>
        <div class="games-grid">
            <div class="game-card" onclick="openGame('Ракета', '🚀')">
                <span class="game-icon">🚀</span>
                <div class="game-name">Ракета</div>
            </div>
            <div class="game-card" onclick="openGame('Краш', '📈')">
                <span class="game-icon">📈</span>
                <div class="game-name">Краш</div>
            </div>
            <div class="game-card" onclick="openGame('Мінер', '💣')">
                <span class="game-icon">💣</span>
                <div class="game-name">Мінер</div>
            </div>
            <div class="game-card" onclick="openGame('Плінко', '🔮')">
                <span class="game-icon">🔮</span>
                <div class="game-name">Плінко</div>
            </div>
            <div class="game-card" onclick="openGame('Орел і Решка', '🪙')">
                <span class="game-icon">🪙</span>
                <div class="game-name">Орел і Решка</div>
            </div>
            <div class="game-card" onclick="openGame('Слоти', '🎰')">
                <span class="game-icon">🎰</span>
                <div class="game-name">Слоти</div>
            </div>
            <div class="game-card" onclick="openGame('Лесенка', '🪜')">
                <span class="game-icon">🪜</span>
                <div class="game-name">Лесенка</div>
            </div>
            <div class="game-card" onclick="openGame('Башня', '🏰')">
                <span class="game-icon">🏰</span>
                <div class="game-name">Башня</div>
            </div>
        </div>
    </div>

    <div class="nav-bar">
        <a href="#" class="nav-item active"><span>🎮</span>Ігри</a>
        <a href="#" class="nav-item" onclick="triggerAction('support')"><span>🎧</span>Підтримка</a>
        <a href="#" class="nav-item" onclick="triggerAction('profile')"><span>👤</span>Профіль</a>
    </div>

    <div class="modal" id="game-modal">
        <div class="modal-content">
            <div class="modal-title" id="modal-game-title">Гра</div>
            <div class="bet-input-box">
                <input type="number" id="bet-amount" value="10" min="1">
            </div>
            <button class="bet-btn" onclick="playRound()">Грати</button>
            <div class="close-btn" onclick="closeModal()">Скасувати</div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const user = tg.initDataUnsafe?.user;
        if (user) {
            document.getElementById('user-name').innerText = user.username ? '@' + user.username : user.first_name;
            document.getElementById('user-id').innerText = 'ID: ' + user.id;
            if (user.first_name) {
                document.getElementById('user-avatar').innerText = user.first_name.charAt(0).toUpperCase();
            }
        }

        let currentGame = "";

        function openGame(gameName, icon) {
            currentGame = gameName;
            document.getElementById('modal-game-title').innerText = icon + " " + gameName;
            document.getElementById('game-modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('game-modal').classList.remove('active');
        }

        function playRound() {
            const betValue = parseInt(document.getElementById('bet-amount').value);
            if (isNaN(betValue) || betValue <= 0) return;

            closeModal();
            const isWin = Math.random() > 0.55;
            let change = isWin ? Math.round(betValue * 1.8) - betValue : -betValue;
            let textResult = isWin ? `🎉 **Виграш у ${currentGame}!**\n➕ Зараховано: **+${Math.round(betValue * 1.8)}** Stars` : `📉 **Програш у ${currentGame}...**\n➖ Списано: **-${betValue}** Stars`;

            tg.sendData(JSON.stringify({ game: currentGame, bet: betValue, change: change, text: textResult }));
            tg.close();
        }

        function triggerAction(actionName) {
            tg.sendData(JSON.stringify({ action: actionName }));
            tg.close();
        }
    </script>
</body>
</html>
